<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='index.html'">

    <!-- Calculator Page Content -->
    <section class="calculator-page">
        <div class="container">
            <div class="calculator-header">
                <h1>SSID Overhead Calculator</h1>
            </div>
            
            <div class="calculator-body">
                <div class="calculator-form">
                    <h3>Input Parameters</h3>
                    <div class="calculator-inputs">
                        <div class="form-group">
                            <label class="form-label">Number of APs on Channel:</label>
                            <input type="number" id="numAPs" class="form-control" value="1" min="1" max="100" title="Number of access points transmitting on the same channel">
                        </div>
                        <div class="form-group">
                            <label class="form-label">SSIDs per AP:</label>
                            <input type="number" id="numSSIDs" class="form-control" value="2" min="1" max="50" title="Number of SSIDs (virtual APs) per access point">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Beacon Interval (ms):</label>
                            <input type="number" id="beaconInterval" class="form-control" value="100" min="20" max="1000" title="Time interval between beacon transmissions (typically 100ms)">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Beacon Frame Size (bytes):</label>
                            <input type="number" id="beaconFrameSize" class="form-control" value="300" min="100" max="1024" title="Size of beacon frame including management overhead">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Beacon Data Rate (Mbps):</label>
                            <select id="beaconDataRate" class="form-select" title="Data rate used for beacon transmission">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="5.5">5.5</option>
                                <option value="6" selected>6</option>
                                <option value="12">12</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Preamble Type:</label>
                            <select id="preambleType" class="form-select" title="Preamble type used for beacon transmission">
                                <option value="192" selected>802.11g/n/ac/ax Short (192μs)</option>
                                <option value="96">802.11b Short (96μs)</option>
                                <option value="144">802.11b Long (144μs)</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-calculate" onclick="calculateSSIDOverhead()">Calculate SSID Overhead</button>
                    
                    <div id="ssidOutput" class="calculation-results" style="display: none;">
                        <!-- Results will be displayed here -->
                    </div>
                </div>
                
                <div class="chart-section">
                    <h3>Overhead Visualization</h3>
                    <div class="chart-container">
                        <canvas id="ssidOverheadChart" class="airtime-chart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </section>
