<style>
body {

  margin: 0;

/* HEADER */
.hero {

  padding: 40px 20px 20px;
}

.hero h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  color: #666;

  margin: auto;

.tags {

}

.tag {

function normalize(text){
  return text.toLowerCase()
    .replace(/wi[\s\-]?fi/g,"wifi")
    .replace(/\s+/g," ");
}

/* RENDER */
function render(data){
  const container=document.getElementById("factsContainer");
  container.innerHTML="";
  data.forEach(f=>{
    const div=document.createElement("div");
    div.className="tile";
    div.onclick=()=>window.open(f.link,'_blank');
    div.innerHTML=`
      <div class="title">💡 ${f.title}</div>
      <div class="desc">${f.desc}</div>
      <div class="tags">${f.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    `;
    container.appendChild(div);
  });
}

/* INITIAL LOAD */
render([...facts].reverse());

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  const val=normalize(e.target.value);
  render([...facts].reverse().filter(f=>
    normalize(f.title).includes(val) ||
    normalize(f.desc).includes(val) ||
    normalize(f.tags.join(" ")).includes(val)
  ));
});

</script>

</body>
</html>
